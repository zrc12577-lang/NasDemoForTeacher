spring.application.name=NasDemo

# 本机当 NAS 服务器时：Root 面板「存储目录」填本机绝对路径（如 E:\NAS\storage），数据落在该盘；数据库 nas.db 仍在 user.dir。
# SQLite (file-based)
spring.datasource.url=jdbc:sqlite:${user.dir}/nas.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Initialize schema + seed data on startup
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

# Multipart uploads
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB

# Helpful for LAN access
server.address=0.0.0.0
server.port=18080

# 浏览器会把 JSESSIONID 绑在「主机名」上；请勿混用 http://localhost:18080 与 http://127.0.0.1:18080，否则 Cookie 不共享、会表现为一直未登录。
